    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <style>
        /* ===== فونت عثمان طه ===== */
        @font-face {
            font-family: "UthmanicHafs";
            src: url("https://cdn.jsdelivr.net/gh/arabtype/uthmanic-hafs@latest/UthmanicHafs.woff2") format("woff2");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: "VazirmatnLocal";
            src: url("https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css") format("woff2");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        /* ===== تم‌ها ===== */
        :root {
            --bg: #0b1220;
            --bg2: #0f172a;
            --bg3: #1a2338;
            --text: #e8eefc;
            --muted: #9fb0d0;
            --accent: #6ea8fe;
            --accent2: #8b5cf6;
            --gold: #fbbf24;
            --border: rgba(255,255,255,.08);
            --shadow: 0 15px 50px rgba(0,0,0,.5);
            --radius: 24px;
            --glass: blur(12px);
            --card-bg: rgba(255,255,255,0.03);
            --glow: 0 0 50px rgba(110,168,254,0.05);
            --success: #34d399;
            --danger: #ef4444;
            
            --bg-active: var(--bg);
            --bg2-active: var(--bg2);
            --bg3-active: var(--bg3);
            --text-active: var(--text);
            --muted-active: var(--muted);
            --border-active: var(--border);
            --shadow-active: var(--shadow);
            --card-bg-active: var(--card-bg);
            --glow-active: var(--glow);
        }

        [data-theme="light"] {
            --bg-active: #f0f4f9;
            --bg2-active: #ffffff;
            --bg3-active: #e8edf5;
            --text-active: #1a202c;
            --muted-active: #4a5568;
            --border-active: rgba(0,0,0,.08);
            --shadow-active: 0 8px 30px rgba(0,0,0,.08);
            --card-bg-active: rgba(0,0,0,0.01);
            --glow-active: 0 0 30px rgba(110,168,254,0.03);
        }

        [data-theme="muharram"] {
            --bg-active: #1a0a0a;
            --bg2-active: #2d1414;
            --bg3-active: #3d1a1a;
            --text-active: #f5e6e6;
            --muted-active: #c49a9a;
            --accent: #e53e3e;
            --accent2: #c53030;
            --gold: #f6ad55;
            --border-active: rgba(180, 40, 40, 0.25);
            --shadow-active: 0 15px 50px rgba(80, 0, 0, 0.5);
            --card-bg-active: rgba(180, 40, 40, 0.04);
            --glow-active: 0 0 40px rgba(229, 62, 62, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "VazirmatnLocal", "Segoe UI", sans-serif;
            background: var(--bg-active);
            color: var(--text-active);
            min-height: 100vh;
            transition: all 0.4s ease;
            padding: 1rem;
            overflow-x: hidden;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg2-active); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* ===== Header ===== */
        .header {
            text-align: center;
            padding: 1rem 0 0.6rem;
            margin-bottom: 0.8rem;
            position: relative;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 2.5px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--accent2), transparent);
            border-radius: 10px;
            opacity: 0.6;
        }
        
        .header h1 {
            font-family: 'Amiri', 'VazirmatnLocal', serif;
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--accent2), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 6px;
            line-height: 1.3;
        }
        
        .header h1 i {
            background: none;
            -webkit-text-fill-color: initial;
            color: var(--gold);
            font-size: 2rem;
        }
        
        .header .sub {
            color: var(--muted-active);
            font-size: 0.85rem;
            margin-top: 0.2rem;
            opacity: 0.5;
            font-family: 'Amiri', serif;
            letter-spacing: 3px;
        }

        /* ===== Install Banner ===== */
        .install-banner {
            display: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
            margin: 0 auto 1rem;
            max-width: 500px;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 6px 30px rgba(110, 168, 254, 0.3);
            animation: slideDown 0.5s ease;
        }
        
        .install-banner.show { display: flex; }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .install-banner span {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 500;
        }
        
        .install-banner .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        
        .install-banner .close-btn:hover { background: rgba(255,255,255,0.3); }

        /* ===== Top Bar ===== */
        .top-bar {
            max-width: 1200px;
            margin: 0 auto 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
            align-items: center;
            background: var(--bg2-active);
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            backdrop-filter: var(--glass);
            border: 1px solid var(--border-active);
            box-shadow: var(--shadow-active);
            transition: all 0.3s;
            position: sticky;
            top: 8px;
            z-index: 100;
        }
        
        .top-bar input {
            flex: 1;
            min-width: 160px;
            background: var(--bg3-active);
            border: 1px solid var(--border-active);
            border-radius: 30px;
            padding: 0.6rem 1.2rem;
            color: var(--text-active);
            font-family: inherit;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        
        .top-bar input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(110, 168, 254, 0.12);
        }
        
        .top-bar input::placeholder {
            color: var(--muted-active);
            opacity: 0.5;
            font-size: 0.85rem;
        }
        
        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .btn-group button {
            background: var(--bg3-active);
            border: 1px solid var(--border-active);
            color: var(--text-active);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-group button i { font-size: 0.85rem; }
        
        .btn-group button:hover {
            background: var(--accent);
            color: #0b1220;
            transform: translateY(-2px) scale(1.02);
        }
        
        .btn-group button.active {
            background: var(--accent);
            color: #0b1220;
            box-shadow: 0 0 30px rgba(110, 168, 254, 0.25);
        }
        
        .theme-selector {
            display: flex;
            gap: 6px;
        }
        
        .theme-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid var(--border-active);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }
        
        .theme-btn:hover { transform: scale(1.2) rotate(10deg); border-color: var(--gold); }
        .theme-btn[data-theme="dark"] { background: #0b1220; border-color: #6ea8fe; }
        .theme-btn[data-theme="light"] { background: #f0f4f9; border-color: #6b7280; }
        .theme-btn[data-theme="muharram"] { background: #2d1414; border-color: #e53e3e; }

        /* ===== Stats ===== */
        .stats-bar {
            max-width: 1200px;
            margin: 0 auto 1rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: var(--muted-active);
            opacity: 0.6;
        }
        
        .stats-bar span {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg3-active);
            padding: 4px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-active);
        }
        
        .stats-bar i { font-size: 0.8rem; }

        /* ===== Surah Grid ===== */
        .surah-grid {
            max-width: 1200px;
            margin: 0 auto 1.2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 1rem;
            padding: 0 0.3rem;
        }
        
        .surah-card {
            background: var(--bg2-active);
            border: 1px solid var(--border-active);
            border-radius: 20px;
            padding: 1.2rem 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        
        .surah-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            opacity: 0;
            transition: 0.5s;
            border-radius: 20px;
        }
        
        .surah-card:hover::before { opacity: 0.08; }
        
        .surah-card:hover {
            transform: translateY(-6px) scale(1.03);
            border-color: var(--accent);
            box-shadow: 0 16px 50px rgba(110, 168, 254, 0.2);
        }
        
        .surah-card:active { transform: scale(0.95); }
        
        .surah-card .surah-number {
            font-size: 0.7rem;
            color: var(--muted-active);
            opacity: 0.5;
            position: relative;
            z-index: 1;
            font-weight: 700;
        }
        
        .surah-card .surah-name {
            font-family: "UthmanicHafs", "VazirmatnLocal", serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-active);
            margin: 0.2rem 0;
            position: relative;
            z-index: 1;
        }
        
        .surah-card .surah-name-ar {
            font-family: "UthmanicHafs", serif;
            font-size: 1.3rem;
            color: var(--gold);
            position: relative;
            z-index: 1;
            margin-top: 0.1rem;
        }
        
        .surah-card .surah-info {
            font-size: 0.7rem;
            color: var(--muted-active);
            opacity: 0.5;
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }
        
        .surah-card .surah-info span {
            background: var(--bg3-active);
            padding: 2px 12px;
            border-radius: 12px;
        }

        /* ===== Quran Container ===== */
        .quran-container {
            max-width: 1050px;
            margin: 0 auto;
            background: var(--bg2-active);
            border-radius: var(--radius);
            padding: 1.8rem 2.2rem 2.2rem;
            backdrop-filter: var(--glass);
            border: 1px solid var(--border-active);
            box-shadow: var(--shadow-active);
            transition: all 0.4s;
            max-height: 80vh;
            overflow-y: auto;
            display: none;
            scroll-behavior: smooth;
        }
        
        .quran-container.active {
            display: block;
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .surah-header {
            text-align: center;
            margin-bottom: 1.8rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid var(--border-active);
            position: sticky;
            top: 0;
            background: var(--bg2-active);
            z-index: 10;
            padding-top: 0.3rem;
        }
        
        .surah-header .surah-title {
            font-family: "UthmanicHafs", serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }
        
        .surah-header .surah-meta {
            font-size: 0.85rem;
            color: var(--muted-active);
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        
        .surah-header .surah-meta span {
            background: var(--bg3-active);
            padding: 3px 16px;
            border-radius: 20px;
        }

        /* ===== Progress Bar ===== */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg3-active);
            border-radius: 10px;
            margin: 0.6rem 0 1.2rem;
            overflow: hidden;
        }
        
        .progress-bar .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--gold));
            border-radius: 10px;
            width: 0%;
            transition: width 0.4s ease;
        }

        /* ===== Aya Cards ===== */
        .aya-block {
            background: var(--card-bg-active);
            border: 1px solid var(--border-active);
            border-radius: 18px;
            padding: 1.2rem 1.4rem 1rem;
            transition: all 0.35s ease;
            cursor: pointer;
            margin-bottom: 0.9rem;
            box-shadow: var(--glow-active);
            position: relative;
        }
        
        .aya-block::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent), var(--accent2));
            border-radius: 0 4px 4px 0;
            opacity: 0;
            transition: 0.4s;
        }
        
        .aya-block:hover::before { opacity: 0.6; }
        
        .aya-block:hover {
            background: rgba(110, 168, 254, 0.04);
            border-color: var(--accent);
            transform: translateX(-5px);
            box-shadow: 0 10px 40px rgba(110, 168, 254, 0.08);
        }
        
        .aya-block:active { transform: scale(0.98); }
        
        .aya-block .aya-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.3rem;
        }
        
        .aya-block .aya-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 38px;
            height: 38px;
            font-size: 0.85rem;
            color: var(--muted-active);
            background: var(--bg3-active);
            border-radius: 50%;
            font-weight: 700;
            border: 1px solid var(--border-active);
            transition: 0.3s;
        }
        
        .aya-block:hover .aya-number {
            border-color: var(--accent);
            color: var(--accent);
            transform: scale(1.05);
        }
        
        .aya-block .aya-page-badge {
            font-size: 0.7rem;
            color: var(--muted-active);
            background: var(--bg3-active);
            padding: 3px 14px;
            border-radius: 20px;
            opacity: 0.6;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .aya-block .aya-page-badge i { font-size: 0.65rem; }
        .aya-block:hover .aya-page-badge { opacity: 1; }
        
        .aya-block .aya-text {
            font-family: "UthmanicHafs", serif;
            font-size: 1.8rem;
            font-weight: 400;
            line-height: 2.5;
            word-spacing: 3px;
            color: var(--text-active);
            direction: rtl;
            padding: 0.4rem 0;
        }
        
        .aya-block .aya-text.recited {
            color: var(--gold);
            text-shadow: 0 0 40px rgba(251, 191, 36, 0.2);
        }
        
        .aya-block .aya-translation {
            font-family: "VazirmatnLocal", sans-serif;
            font-size: 1rem;
            color: var(--muted-active);
            padding: 0.4rem 0 0.3rem 1rem;
            line-height: 1.9;
            border-right: 2.5px solid var(--accent);
            margin-right: 0.5rem;
            opacity: 0.8;
            transition: 0.3s;
        }
        
        .aya-block:hover .aya-translation { opacity: 1; }
        
        .aya-block .aya-actions {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.6rem;
            padding-top: 0.6rem;
            border-top: 1px solid var(--border-active);
            flex-wrap: wrap;
        }
        
        .aya-block .aya-actions button {
            background: var(--bg3-active);
            border: 1px solid var(--border-active);
            color: var(--muted-active);
            padding: 0.35rem 1.1rem;
            border-radius: 25px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .aya-block .aya-actions button i { font-size: 0.8rem; }
        
        .aya-block .aya-actions button:hover {
            background: var(--accent);
            color: #0b1220;
            border-color: var(--accent);
            transform: scale(1.06);
        }
        
        .aya-block .aya-actions button.playing {
            background: var(--gold);
            color: #0b1220;
            border-color: var(--gold);
            animation: pulseBtn 1s infinite;
        }
        
        @keyframes pulseBtn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }
        
        .playing-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--gold);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulseDot 1s infinite;
        }
        
        @keyframes pulseDot {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ===== Player Controls ===== */
        .player-controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            margin-top: 1.2rem;
            padding-top: 1.2rem;
            border-top: 1px solid var(--border-active);
            flex-wrap: wrap;
        }
        
        .player-controls button {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: #0b1220;
            padding: 0.6rem 1.8rem;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;

    // ================================================================
    //  ====== دریافت آیات ======
    // ================================================================
    async function fetchSurahData(surahId) {
        try {
            const response1 = await fetch(`https://api.alquran.cloud/v1/surah/${surahId}/quran-uthmani`);
            if (!response1.ok) throw new Error('Network error');
            const data1 = await response1.json();
            
            const response2 = await fetch(`https://api.alquran.cloud/v1/surah/${surahId}/fa.ansarian`);
            if (!response2.ok) throw new Error('Network error');
            const data2 = await response2.json();
            
            const arabicVerses = data1.data.ayahs || [];
            const persianVerses = data2.data.ayahs || [];
            
            const result = arabicVerses.map((verse, index) => ({
                number: verse.numberInSurah,
                text: verse.text,
                translation: persianVerses[index]?.text || `ترجمه آیه ${verse.numberInSurah}`,
                page: verse.page || 1
            }));
            
            return result;
        } catch (error) {
            console.error('Error fetching data:', error);
            try {
                const response = await fetch(`https://api.alquran.cloud/v1/surah/${surahId}/fa.irian`);
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                const verses = data.data.ayahs || [];
                return verses.map((verse, index) => ({
                    number: verse.numberInSurah,
                    text: verse.text,
                    translation: verse.text,
                    page: verse.page || 1
                }));
            } catch (e) {
                return [];
            }
        }
    }

    // ================================================================
    //  ====== حالت‌های برنامه ======
    // ================================================================
    let currentMode = 'full';
    let currentSurahId = 1;
    let currentVerseIndex = 0;
    let versesCache = {};

    // ================================================================
    //  ====== Toast Notification ======
    // ================================================================
    function showToast(message, type = 'info') {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const icon = toast.querySelector('i');
        
        icon.className = type === 'success' ? 'fas fa-check-circle' : 
                        type === 'error' ? 'fas fa-exclamation-circle' : 
                        'fas fa-info-circle';
        toast.className = `toast ${type}`;
        toastMessage.textContent = message;
        
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ================================================================
    //  ====== تابع نمایش پیام عدم دسترسی ======
    // ================================================================
    function showComingSoon() {
        showToast('🎧 قابلیت پخش صدا در نسخه‌های بعدی در دسترس خواهد بود', 'info');
        document.getElementById('audioStatus').textContent = '🔊 قابلیت پخش صدا در نسخه بعدی';
        document.getElementById('audioStatus').className = 'audio-status';
    }

    // ================================================================
    //  ====== رندر سوره ======
    // ================================================================
    async function renderSurah(surahId) {
        const surah = surahList.find(s => s.id === surahId);
        if (!surah) return;
        
        currentSurahId = surahId;
        const container = document.getElementById('quranContainer');
        container.classList.add('active');
        
        document.getElementById('surahTitle').textContent = surah.nameAr;
        document.getElementById('surahType').textContent = surah.type;
        document.getElementById('surahVerses').textContent = surah.verses;
        document.getElementById('surahPage').textContent = surah.page;
        
        const ayaList = document.getElementById('ayaList');
        ayaList.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i>در حال بارگذاری</div>';
        
        const verses = await fetchSurahData(surahId);
        versesCache[surahId] = verses;
        
        if (verses.length === 0) {
            ayaList.innerHTML = '<div class="error-msg"><i class="fas fa-exclamation-circle"></i>خطا در بارگذاری</div>';
            showToast('خطا در بارگذاری آیات', 'error');
            return;
        }
        
        ayaList.innerHTML = '';
        
        verses.forEach((verse, idx) => {
            const block = document.createElement('div');
            block.className = 'aya-block';
            block.dataset.ayaIndex = idx;
            
            const top = document.createElement('div');
            top.className = 'aya-top';
            
            const numSpan = document.createElement('span');
            numSpan.className = 'aya-number';
            numSpan.textContent = verse.number;
            
            const pageBadge = document.createElement('span');
            pageBadge.className = 'aya-page-badge';
            pageBadge.innerHTML = `<i class="fas fa-book"></i> ص ${verse.page || surah.page}`;
            
            top.appendChild(numSpan);
            top.appendChild(pageBadge);
            block.appendChild(top);
            
            const textSpan = document.createElement('div');
            textSpan.className = 'aya-text';
            textSpan.textContent = verse.text;
            block.appendChild(textSpan);
            
            const translationDiv = document.createElement('div');
            translationDiv.className = 'aya-translation';
            translationDiv.textContent = `﴿ ${verse.translation} ﴾`;
            block.appendChild(translationDiv);
            
            const actions = document.createElement('div');
            actions.className = 'aya-actions';
            
            const playBtn = document.createElement('button');
            playBtn.innerHTML = '<i class="fas fa-play"></i> پخش';
            playBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showComingSoon();
            });
            
            actions.appendChild(playBtn);
            block.appendChild(actions);
            
            block.addEventListener('click', function(e) {
                if (e.target.closest('button')) return;
                showComingSoon();
            });
            
            ayaList.appendChild(block);
        });
        
        setTimeout(() => {
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 300);
        
        document.getElementById('backBtn').classList.add('show');
        document.getElementById('scrollTopBtn').classList.add('show');
    }

    document.getElementById('modeAya').addEventListener('click', function() {

        currentMode = 'aya';

        showToast('حالت پخش آیه‌به‌آیه', 'info');
    });

    document.getElementById('searchInput').addEventListener('input', function() {
        const val = this.value.trim();
        renderSurahList(val);
    });

    document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const theme = this.dataset.theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const names = { dark: '🌙 تاریک', light: '☀️ روشن', muharram: '❤️ محرم' };
            showToast(`تم ${names[theme]}`, 'info');
        });
    });

    document.getElementById('backBtn').addEventListener('click', function() {
        document.getElementById('quranContainer').classList.remove('active');
        this.classList.remove('show');
        document.getElementById('scrollTopBtn').classList.remove('show');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.getElementById('scrollTopBtn').addEventListener('click', function() {
        document.getElementById('quranContainer').scrollTo({ top: 0, behavior: 'smooth' });
    });

    function renderSurahList(filter = '') {
        const grid = document.getElementById('surahGrid');
        grid.innerHTML = '';
        
        const filtered = surahList.filter(s => 
            s.name.includes(filter) || 
            s.nameAr.includes(filter) ||
            s.id.toString().includes(filter)
        );
        
        filtered.forEach(surah => {
            const card = document.createElement('div');
            card.className = 'surah-card';
            card.innerHTML = `
                <div class="surah-number">${surah.id}</div>
                <div class="surah-name">${surah.name}</div>
                <div class="surah-name-ar">${surah.nameAr}</div>
                <div class="surah-info">
                    <span>${surah.type}</span>
                    <span>${surah.verses}</span>
                    <span>ص${surah.page}</span>
                </div>
            `;
            card.addEventListener('click', () => {
                renderSurah(surah.id);
                document.getElementById('searchInput').value = '';
                renderSurahList();
            });
            grid.appendChild(card);
        });
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { document.getElementById('backBtn').click(); }
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
            if (currentSurahId < 114) { renderSurah(currentSurahId + 1); e.preventDefault(); }
        }
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            if (currentSurahId > 1) { renderSurah(currentSurahId - 1); e.preventDefault(); }
        }
    });

    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    renderSurahList();
    renderSurah(1);
</script>
